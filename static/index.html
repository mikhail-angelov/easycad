<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyCAD</title>
  <style>
    :root {
      --bg: #101114;
      --panel: #1b1d22;
      --panel2: #242832;
      --text: #eef1f5;
      --muted: #9aa3b2;
      --line: #343947;
      --accent: #4fa3ff;
      --ok: #58c274;
      --warn: #e2b84d;
      --err: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      grid-template-columns: 390px 1fr;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      overflow: auto;
    }
    main { position: relative; min-width: 0; }
    h1 {
      font-size: 17px;
      line-height: 1.2;
      margin: 0 0 12px;
      font-weight: 650;
    }
    h2 {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0;
      margin: 18px 0 8px;
    }
    select, input, button, textarea {
      font: inherit;
    }
    select, input, textarea {
      width: 100%;
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
    }
    textarea {
      min-height: 190px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }
    #instructions {
      min-height: 68px;
      font-family: inherit;
      font-size: 12px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel2);
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #07111f;
      font-weight: 650;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .file-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .upload-target {
      width: 100%;
      min-height: 78px;
      display: grid;
      align-content: center;
      gap: 4px;
      border: 1px dashed var(--line);
      border-radius: 6px;
      background: var(--panel2);
      color: var(--text);
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }
    .upload-target:hover,
    .upload-target.dragging {
      border-color: var(--accent);
    }
    .upload-title {
      font-weight: 650;
      font-size: 13px;
    }
    .upload-meta {
      color: var(--muted);
      font-size: 11px;
    }
    .status {
      min-height: 20px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    .param {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      margin-bottom: 8px;
    }
    .param label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .meta {
      color: var(--muted);
      font-size: 11px;
      margin-top: 5px;
    }
    .source-assumed { color: var(--warn); }
    .source-drawing { color: var(--ok); }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-top: 10px;
    }
    .tabs button.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    #viewport {
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: absolute;
      left: 14px;
      bottom: 14px;
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }
    .busy-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      place-items: center;
      background: rgba(16, 17, 20, 0.78);
      backdrop-filter: blur(2px);
      pointer-events: all;
    }
    .busy-overlay.active { display: grid; }
    .busy-panel {
      display: grid;
      justify-items: center;
      gap: 12px;
      width: min(280px, calc(100vw - 32px));
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      color: var(--text);
      text-align: center;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .busy-title {
      font-size: 13px;
      font-weight: 650;
    }
    .busy-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (max-width: 820px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 48vh 52vh;
      }
      aside {
        grid-row: 2;
        border-right: 0;
        border-top: 1px solid var(--line);
      }
      main { grid-row: 1; }
    }
  </style>
</head>
<body>
  <aside>
    <h1>EasyCAD</h1>
    <h2>Drawing</h2>
    <div class="file-row">
      <input id="drawingFile" class="visually-hidden" type="file" accept="image/png,image/jpeg,image/webp">
      <button id="uploadTarget" class="upload-target" type="button">
        <span class="upload-title">Choose drawing</span>
        <span id="uploadMeta" class="upload-meta">PNG, JPEG, or WebP</span>
      </button>
      <textarea id="instructions" placeholder="Optional instructions"></textarea>
    </div>

    <h2>Parameters</h2>
    <div id="parameters"></div>

    <div class="row">
      <button id="generate" class="primary" disabled>Generate</button>
      <button id="downloadStl" disabled>STL</button>
      <button id="downloadStep" disabled>STEP</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="downloadJson" disabled>JSON</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="repairProject" disabled>AI Repair</button>
      <button id="compareProject" disabled>Compare</button>
      <button id="validateProject" disabled>Validate</button>
    </div>
    <div id="status" class="status">Ready</div>

    <div class="tabs">
      <button data-tab="features" class="active">Features</button>
      <button data-tab="assumptions">Assumptions</button>
    </div>
    <section id="features" class="panel active"><h2>Features</h2><ul id="featureList"></ul><h2>Visual issues</h2><ul id="visualIssueList"></ul></section>
    <section id="assumptions" class="panel"><h2>Assumptions</h2><ul id="assumptionList"></ul><div id="errorDetails" class="status err"></div></section>
  </aside>
  <main>
    <div id="viewport"></div>
    <div class="overlay">Drag to orbit. Scroll to zoom.</div>
  </main>
  <div id="busyOverlay" class="busy-overlay" aria-live="polite" aria-busy="false">
    <div class="busy-panel" role="status">
      <div class="spinner" aria-hidden="true"></div>
      <div class="busy-title">Generating CAD</div>
      <div id="busyMessage" class="busy-meta">Processing drawing...</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    const state = { project: null, parameters: {}, lastPreviewUrl: null };
    const $ = (id) => document.getElementById(id);
    const viewport = $('viewport');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101114);
    const camera = new THREE.PerspectiveCamera(36, viewport.clientWidth / viewport.clientHeight, 0.1, 2000);
    camera.position.set(130, 95, 150);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(viewport.clientWidth, viewport.clientHeight);
    viewport.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    scene.add(new THREE.HemisphereLight(0xffffff, 0x20242d, 2.1));
    const key = new THREE.DirectionalLight(0xffffff, 2.2);
    key.position.set(100, 160, 80);
    scene.add(key);
    const grid = new THREE.GridHelper(240, 24, 0x343947, 0x242832);
    grid.position.y = -0.01;
    scene.add(grid);
    let mesh = null;

    function setStatus(text, cls = '') {
      $('status').textContent = text;
      $('status').className = 'status' + (cls ? ' ' + cls : '');
    }

    function setBusy(active, message = 'Processing drawing...') {
      $('busyMessage').textContent = message;
      $('busyOverlay').classList.toggle('active', active);
      $('busyOverlay').setAttribute('aria-busy', active ? 'true' : 'false');
    }

    function currentPayload() {
      return { project: state.project, parameters: state.parameters };
    }

    function enableProjectButtons() {
      $('generate').disabled = false;
      $('downloadStl').disabled = false;
      $('downloadStep').disabled = false;
      $('downloadJson').disabled = false;
      $('repairProject').disabled = false;
      $('compareProject').disabled = false;
      $('validateProject').disabled = false;
    }

    function disableProjectButtons() {
      $('generate').disabled = true;
      $('downloadStl').disabled = true;
      $('downloadStep').disabled = true;
      $('downloadJson').disabled = true;
      $('repairProject').disabled = true;
      $('compareProject').disabled = true;
      $('validateProject').disabled = true;
    }

    function clearGeometry() {
      if (state.lastPreviewUrl) {
        URL.revokeObjectURL(state.lastPreviewUrl);
        state.lastPreviewUrl = null;
      }
      if (mesh) {
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
        mesh = null;
      }
    }

    function clearProjectView() {
      state.project = null;
      state.parameters = {};
      clearGeometry();
      $('parameters').innerHTML = '';
      $('featureList').innerHTML = '';
      $('visualIssueList').innerHTML = '';
      $('assumptionList').innerHTML = '';
      $('errorDetails').textContent = '';
      $('sourceText').value = '';
      document.title = 'EasyCAD';
      disableProjectButtons();
    }

    function escapeAttr(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }

    function parameterDisplayValue(key, param) {
      const value = state.parameters[key] ?? '';
      return param.type === 'number' ? `${value} ${param.unit || ''}` : String(value);
    }

    function renderProject() {
      document.title = `${state.project.title} - EasyCAD`;
      $('parameters').innerHTML = Object.entries(state.project.parameters)
        .map(([key, param]) => {
          if (param.type === 'expression') {
            return `<div class="param"><label>${param.label}<span>${param.expression}</span></label><div class="meta">derived</div></div>`;
          }
          const sourceClass = `source-${param.source}`;
          let control = '';
          if (param.type === 'choice') {
            const options = param.options || [];
            control = `<select data-param="${key}">${options.map(option => `<option value="${escapeAttr(option)}" ${option === state.parameters[key] ? 'selected' : ''}>${escapeAttr(option)}</option>`).join('')}</select>`;
          } else if (param.type === 'text') {
            control = `<input data-param="${key}" type="text" value="${escapeAttr(state.parameters[key])}" maxlength="80">`;
          } else {
            control = `<input data-param="${key}" type="number" value="${state.parameters[key]}" min="${param.min ?? ''}" max="${param.max ?? ''}" step="${param.step ?? 0.1}">`;
          }
          return `<div class="param">
            <label>${param.label}<span>${escapeAttr(parameterDisplayValue(key, param))}</span></label>
            ${control}
            <div class="meta"><span class="${sourceClass}">${param.source}</span>${param.confidence != null ? ` · ${Math.round(param.confidence * 100)}%` : ''}</div>
          </div>`;
        }).join('');
      const capabilityById = Object.fromEntries((state.project.feature_graph?.operations || []).map(operation => [operation.id, operation.capability_status]));
      const coverageById = Object.fromEntries((state.project.feature_coverage?.entries || []).map(entry => [entry.feature_id, entry.status]));
      $('featureList').innerHTML = state.project.feature_summary.map(f => {
        const capability = capabilityById[f.id] || 'unsupported';
        const coverage = coverageById[f.id] || 'unresolved';
        return `<li>${f.name} · capability: ${escapeAttr(capability)} · coverage: ${escapeAttr(coverage)}: ${f.description}</li>`;
      }).join('');
      const visualIssues = state.project.generation?.visual_comparison?.issues || [];
      $('visualIssueList').innerHTML = visualIssues.map(issue =>
        `<li><strong>${escapeAttr(issue.severity)}</strong> · ${escapeAttr(issue.issue_type)}${issue.feature_id ? ` · ${escapeAttr(issue.feature_id)}` : ''}: ${escapeAttr(issue.description)}</li>`
      ).join('');
      $('assumptionList').innerHTML = state.project.assumptions.map(a => `<li>${a}</li>`).join('');
      const error = state.project.generation?.error;
      $('errorDetails').textContent = error ? `${error.stage || 'error'}: ${error.message || 'Project needs review'}` : '';
      document.querySelectorAll('[data-param]').forEach(input => {
        input.addEventListener('input', () => {
          const param = state.project.parameters[input.dataset.param];
          state.parameters[input.dataset.param] = param.type === 'number' ? Number(input.value) : input.value;
          input.closest('.param').querySelector('label span').textContent = parameterDisplayValue(input.dataset.param, param);
        });
        input.addEventListener('change', () => {
          const param = state.project.parameters[input.dataset.param];
          state.parameters[input.dataset.param] = param.type === 'number' ? Number(input.value) : input.value;
          input.closest('.param').querySelector('label span').textContent = parameterDisplayValue(input.dataset.param, param);
        });
      });
    }

    async function generatePreview() {
      if (!state.project) return;
      setStatus('Generating...');
      const res = await fetch('/api/projects/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentPayload())
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail?.message || err.detail || 'Preview failed');
      }
      const blob = await res.blob();
      if (state.lastPreviewUrl) URL.revokeObjectURL(state.lastPreviewUrl);
      state.lastPreviewUrl = URL.createObjectURL(blob);
      const geometry = await new STLLoader().loadAsync(state.lastPreviewUrl);
      showGeometry(geometry);
      setStatus('Generated real STL preview', 'ok');
    }

    async function generateProjectFromUpload() {
      const file = $('drawingFile').files[0];
      if (!file) throw new Error('Choose a drawing image');
      $('uploadMeta').textContent = file.name;
      clearProjectView();
      setStatus('Generating project...');
      const form = new FormData();
      form.append('file', file);
      form.append('instructions', $('instructions').value);
      const res = await fetch('/api/projects/generate', { method: 'POST', body: form });
      const result = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(result.detail?.message || result.detail || 'Project generation failed');
      }
      state.project = result.project;
      state.parameters = {};
      for (const [key, param] of Object.entries(state.project.parameters)) {
        if (param.type !== 'expression') state.parameters[key] = param.value ?? '';
      }
      renderProject();
      enableProjectButtons();
      setStatus(result.status === 'success' ? 'Generated project' : 'Generated project needs review', result.status === 'success' ? 'ok' : '');
      if (result.status === 'success') await generatePreview();
    }

    async function startSelectedFile() {
      const file = $('drawingFile').files[0];
      if (!file) return;
      $('uploadMeta').textContent = file.name;
      setBusy(true, `Processing ${file.name}...`);
      try {
        await generateProjectFromUpload();
      } catch (e) {
        setStatus(e.message, 'err');
      } finally {
        setBusy(false);
      }
    }

    function showGeometry(geometry) {
      geometry.computeVertexNormals();
      geometry.computeBoundingBox();
      const box = geometry.boundingBox;
      const center = new THREE.Vector3();
      box.getCenter(center);
      geometry.translate(-center.x, -center.y, -center.z);
      if (mesh) {
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
      mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({
        color: 0x4fa3ff,
        roughness: 0.52,
        metalness: 0.18
      }));
      scene.add(mesh);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z, 1);
      camera.position.set(maxDim * 1.5, maxDim * 1.05, maxDim * 1.7);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    async function download(format) {
      const operations = state.project.feature_graph?.operations || [];
      const coverage = state.project.feature_coverage?.entries || [];
      const reviewItems = [
        ...operations.filter(item => item.capability_status !== 'supported').map(item => `${item.id}: ${item.capability_status}`),
        ...coverage.filter(item => item.status !== 'implemented').map(item => `${item.feature_id}: ${item.status}`)
      ];
      if (reviewItems.length && !window.confirm(`Review feature status before export:\n${reviewItems.join('\n')}`)) return;
      const res = await fetch(`/api/projects/export?format=${format}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentPayload())
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail?.message || err.detail || 'Export failed');
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${state.project.id}.${format === 'step' ? 'step' : format}`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function validateProject() {
      if (!state.project) return;
      const res = await fetch('/api/projects/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state.project)
      });
      const result = await res.json();
      if (result.valid) setStatus('Static validation passed', 'ok');
      else setStatus(result.errors.map(e => e.message).join('; '), 'err');
    }

    async function repairProject() {
      if (!state.project) return;
      setStatus('Repairing project...');
      const res = await fetch('/api/projects/repair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          project: state.project,
          user_feedback: $('instructions').value
        })
      });
      const result = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(result.detail?.message || result.detail || 'Repair failed');
      }
      state.project = result.project;
      state.parameters = {};
      for (const [key, param] of Object.entries(state.project.parameters)) {
        if (param.type !== 'expression') state.parameters[key] = param.value ?? '';
      }
      renderProject();
      enableProjectButtons();
      setStatus(result.status === 'success' ? 'Repair generated project' : 'Repair needs review', result.status === 'success' ? 'ok' : '');
      if (result.status === 'success') await generatePreview();
    }

    async function compareProject() {
      if (!state.project) return;
      setBusy(true, 'Comparing drawing and model...');
      try {
        const res = await fetch('/api/projects/compare', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project: state.project })
        });
        const result = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(result.detail?.message || result.detail || 'Comparison failed');
        state.project = result.project;
        renderProject();
        const issues = state.project.generation?.visual_comparison?.issues || [];
        setStatus(issues.length ? `${issues.length} advisory visual issue(s)` : 'Visual comparison passed', issues.length ? '' : 'ok');
      } finally {
        setBusy(false);
      }
    }

    document.querySelectorAll('.tabs button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        button.classList.add('active');
        $(button.dataset.tab).classList.add('active');
      });
    });
    $('uploadTarget').addEventListener('click', () => $('drawingFile').click());
    $('drawingFile').addEventListener('change', () => startSelectedFile());
    $('uploadTarget').addEventListener('dragover', event => {
      event.preventDefault();
      $('uploadTarget').classList.add('dragging');
    });
    $('uploadTarget').addEventListener('dragleave', () => $('uploadTarget').classList.remove('dragging'));
    $('uploadTarget').addEventListener('drop', event => {
      event.preventDefault();
      $('uploadTarget').classList.remove('dragging');
      if (!event.dataTransfer.files.length) return;
      $('drawingFile').files = event.dataTransfer.files;
      startSelectedFile();
    });
    $('repairProject').addEventListener('click', () => repairProject().catch(e => setStatus(e.message, 'err')));
    $('compareProject').addEventListener('click', () => compareProject().catch(e => setStatus(e.message, 'err')));
    $('generate').addEventListener('click', () => generatePreview().catch(e => setStatus(e.message, 'err')));
    $('validateProject').addEventListener('click', () => validateProject().catch(e => setStatus(e.message, 'err')));
    $('downloadStl').addEventListener('click', () => download('stl').catch(e => setStatus(e.message, 'err')));
    $('downloadStep').addEventListener('click', () => download('step').catch(e => setStatus(e.message, 'err')));
    $('downloadJson').addEventListener('click', () => download('json').catch(e => setStatus(e.message, 'err')));
    window.addEventListener('resize', () => {
      camera.aspect = viewport.clientWidth / viewport.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewport.clientWidth, viewport.clientHeight);
    });
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
