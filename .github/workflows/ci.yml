name: ci
on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build          # tsc --noEmit && vite build → static/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install OCP/CadQuery runtime libs
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends
             libgl1 libglu1-mesa libxext6 libxrender1 libsm6

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  docker:
    name: build and publish docker images
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Skip the expensive worker rebuild (OCP/CadQuery layer) when none of its
      # inputs changed. The worker image is built ONLY from these paths; anything
      # else (frontend, other app code, docs) leaves it byte-identical.
      # KEEP IN SYNC with the COPY lines in worker/Dockerfile — this list must
      # mirror every file that image vendors in (worker/** + the shared app/*).
      - name: Detect worker changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            worker:
              - 'worker/**'
              - 'app/cq_worker.py'
              - 'app/code_guard.py'

      # The app image bundles the built frontend (static/), so build it here too.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare image names
        id: image
        run: |
          echo "app=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "worker=${REGISTRY}/${GITHUB_REPOSITORY,,}-worker" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── app image ──────────────────────────────────────────────────────────
      - name: App image metadata
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # ── worker image ─────────────────────────────────────────────────────────
      - name: Worker image metadata
        id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.worker }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push worker image
        # Build when the worker's own inputs changed, or always on a release tag
        # (so vX.Y.Z / latest point at a complete, consistent image set).
        if: steps.changes.outputs.worker == 'true' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./worker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
